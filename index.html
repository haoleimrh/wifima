    <script>
        // Apply saved theme early to avoid flash (default: dark)
        (() => {
            const savedTheme = localStorage.getItem('theme');
            const theme = (savedTheme === 'light' || savedTheme === 'dark') ? savedTheme : 'dark';
            document.documentElement.classList.toggle('dark', theme === 'dark');
        })();

        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            900: '#1e3a8a',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.6s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

        function getTheme() {
            return document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        }

        function updateThemeLabel() {
            const themeText = getTheme() === 'dark' ? 'Dark' : 'Light';
            ['theme-label', 'theme-label-mobile'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.textContent = themeText;
            });
        }

        function setTheme(theme) {
            const nextTheme = theme === 'light' ? 'light' : 'dark';
            document.documentElement.classList.toggle('dark', nextTheme === 'dark');
            localStorage.setItem('theme', nextTheme);
            updateThemeLabel();
        }

        function toggleTheme() {
            setTheme(getTheme() === 'dark' ? 'light' : 'dark');
        }

        function syncMobileControls() {
            const lang = document.getElementById('language')?.value;
            const filter = document.getElementById('plan-filter')?.value;
            const mobileLang = document.getElementById('language-mobile');
            const mobileFilter = document.getElementById('plan-filter-mobile');
            if (mobileLang && lang) mobileLang.value = lang;
            if (mobileFilter && filter) mobileFilter.value = filter;
        }

        function normalizeForSearch(value) {
            return String(value || '').toLowerCase().replace(/,/g, '').replace(/\s+/g, ' ').trim();
        }

        function getRowSearchScore(row, query) {
            if (!query) return 1;
            const raw = row.join(' ').toLowerCase();
            const normalized = normalizeForSearch(row.join(' '));
            let score = 0;

            if (raw.includes(query)) score += 30;
            if (normalized.includes(query)) score += 40;

            if (/^\d+$/.test(query)) {
                const numericChunks = row.join(' ').match(/[\d,]+/g) || [];
                for (const chunk of numericChunks) {
                    const n = chunk.replace(/,/g, '');
                    if (n === query) score += 120;
                    else if (n.startsWith(query)) score += 70;
                    else if (n.includes(query)) score += 35;
                }
            }

            return score;
        }

        function setActiveFilterChip(filterValue) {
            document.querySelectorAll('[data-filter-chip]').forEach(btn => {
                const isActive = btn.getAttribute('data-filter-chip') === filterValue;
                btn.classList.toggle('bg-[#007f3f]', isActive);
                btn.classList.toggle('text-white', isActive);
                btn.classList.toggle('border-[#007f3f]', isActive);
            });
        }

        function renderContent() {
            const lang = document.getElementById('language').value;
            const filter = document.getElementById('plan-filter').value;
            const searchTerm = normalizeForSearch((document.getElementById('plan-search')?.value || '').trim());
            const content = siteData[lang];

            if (!content) return;

            document.getElementById('opt-all').textContent = content.ui.all;
            document.getElementById('opt-basic').textContent = content.ui.basic;
            document.getElementById('opt-premium').textContent = content.ui.premium;
            document.getElementById('opt-all-mobile').textContent = content.ui.all;
            document.getElementById('opt-basic-mobile').textContent = content.ui.basic;
            document.getElementById('opt-premium-mobile').textContent = content.ui.premium;
            document.getElementById('hero-subtitle').textContent = content.ui.subtitle;
            document.getElementById('hero-desc').textContent = content.ui.desc;
            document.getElementById('page-title').textContent = content.title;
            document.title = content.title;
            setActiveFilterChip(filter);

            const cardsContainer = document.getElementById('plan-cards');
            const emptyState = document.getElementById('empty-state');
            
            const filteredPlans = content.plans.map(row => {
                const planName = row[0];
                const isBasic = planName === 'Basic' || planName === 'အခြေခံ';
                const isPremium = planName === 'Premium' || planName === 'ပရီမီယံ';
                const passFilter = filter === 'all' || (filter === 'basic' && isBasic) || (filter === 'premium' && isPremium);
                const score = getRowSearchScore(row, searchTerm);
                return { row, passFilter, score };
            }).filter(item => item.passFilter && item.score > 0)
              .sort((a, b) => b.score - a.score)
              .map(item => item.row);

            if (filteredPlans.length > 0) {
                emptyState.classList.add('hidden');
                cardsContainer.innerHTML = filteredPlans.map(row => {
                    const planBadge = getPlanBadge(row[0]);
                    const isPremium = row[0] === 'Premium' || row[0] === 'ပရီမီယံ';
                    const primaryLabel = isPremium ? 'Resume' : 'One Time';
                    const primaryValue = row[3];
                    const resumeValue = isPremium ? row[3] : (row[4] === '-' ? 'N/A' : row[4]);
                    return `
                        <div class="rounded-2xl overflow-hidden border border-slate-200/70 dark:border-slate-700 bg-white dark:bg-slate-900 shadow-sm hover:shadow-xl transition-all hover:-translate-y-0.5">
                            <div class="px-4 py-3 bg-gradient-to-r from-[#007f3f] to-[#00994d] text-white flex items-center justify-between">
                                <span class="text-xs font-semibold uppercase tracking-wider">Recharge Offer</span>
                                <span class="text-xs font-medium opacity-90">${row[1]}</span>
                            </div>
                            <div class="p-5">
                                <div class="flex items-center justify-between gap-3 mb-4">
                                    ${planBadge}
                                    <div class="text-right">
                                        <p class="text-xs text-slate-500 dark:text-slate-400">${primaryLabel}</p>
                                        <p class="text-2xl font-extrabold text-[#007f3f] dark:text-[#35c27b]">${primaryValue}</p>
                                    </div>
                                </div>
                                <p class="text-sm text-slate-600 dark:text-slate-300 mb-4 min-h-[40px]">${row[2]}</p>
                                <div class="pt-3 border-t border-slate-100 dark:border-slate-700 flex items-center justify-between">
                                    <span class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Resume</span>
                                    <span class="text-sm font-bold ${resumeValue === 'N/A' ? 'text-slate-400 dark:text-slate-500' : 'text-indigo-600 dark:text-indigo-300'}">${resumeValue}</span>
                                </div>
                            </div>
                        </div>`;
                }).join('');
            } else {
                cardsContainer.innerHTML = '';
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            }

            document.getElementById('footer-text').textContent = content.footer;
            syncMobileControls();
        }

        function openMobileDrawer() {
            const drawer = document.getElementById('mobile-drawer');
            if (!drawer) return;
            syncMobileControls();
            drawer.classList.remove('hidden');
        }

        function closeMobileDrawer() {
            const drawer = document.getElementById('mobile-drawer');
            if (!drawer) return;
            drawer.classList.add('hidden');
        }

        window.onload = () => {

            if (themeToggleMobile) themeToggleMobile.addEventListener('click', toggleTheme);

            const mobileOpen = document.getElementById('mobile-menu-open');
            const mobileClose = document.getElementById('mobile-menu-close');

            if (mobileClose) mobileClose.addEventListener('click', closeMobileDrawer);
            if (mobileOverlay) mobileOverlay.addEventListener('click', closeMobileDrawer);

            const mobileLanguage = document.getElementById('language-mobile');
            const mobileFilter = document.getElementById('plan-filter-mobile');
            if (mobileLanguage) {
                mobileLanguage.addEventListener('change', () => {
                    document.getElementById('language').value = mobileLanguage.value;

            }
            document.querySelectorAll('[data-filter-chip]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const selected = btn.getAttribute('data-filter-chip');
                    document.getElementById('plan-filter').value = selected;
                    renderContent();
                });
            });

            const savedTheme = localStorage.getItem('theme');
            setTheme((savedTheme === 'light' || savedTheme === 'dark') ? savedTheme : 'dark');
            renderContent();
        };
    </script>
</body>
</html>
